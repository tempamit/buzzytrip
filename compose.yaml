name: buzzytrip-local

services:
  database:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-buzzytrip}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-buzzytrip_local}
      POSTGRES_USER: ${POSTGRES_USER:-buzzytrip}
    ports:
      - '127.0.0.1:${POSTGRES_PORT:-55432}:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-buzzytrip} -d ${POSTGRES_DB:-buzzytrip}']
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped
    volumes:
      - database_data:/var/lib/postgresql/data

volumes:
  database_data:
