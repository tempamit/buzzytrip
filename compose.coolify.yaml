name: buzzytrip

x-api-build: &api-build
  context: .
  dockerfile: Dockerfile
  target: api

x-runtime-security: &runtime-security
  cap_drop:
    - ALL
  init: true
  security_opt:
    - no-new-privileges:true

x-logging: &default-logging
  driver: json-file
  options:
    max-file: '3'
    max-size: 10m

services:
  migrate:
    <<: *runtime-security
    build: *api-build
    command: ['node', '/app/packages/database/dist/migrate.js']
    environment:
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL must point to the private Coolify PostgreSQL service}
      NODE_ENV: production
    logging: *default-logging
    restart: 'no'

  api:
    <<: *runtime-security
    build: *api-build
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL must point to the private Coolify PostgreSQL service}
      DB_POOL_MAX: ${API_DB_POOL_MAX:-10}
      NODE_ENV: production
      PORT: 4000
    expose:
      - '4000'
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:4000/api/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    logging: *default-logging
    restart: unless-stopped

  worker:
    <<: *runtime-security
    build:
      context: .
      dockerfile: Dockerfile
      target: worker
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      CONTENT_GENERATION_ENABLED: ${CONTENT_GENERATION_ENABLED:-false}
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL must point to the private Coolify PostgreSQL service}
      DB_POOL_MAX: ${WORKER_DB_POOL_MAX:-5}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_DAILY_REQUEST_LIMIT: ${GEMINI_DAILY_REQUEST_LIMIT:-10}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-flash-latest}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GROQ_DAILY_REQUEST_LIMIT: ${GROQ_DAILY_REQUEST_LIMIT:-10}
      GROQ_MODEL: ${GROQ_MODEL:-openai/gpt-oss-20b}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      MEDIA_DISCOVERY_ENABLED: ${MEDIA_DISCOVERY_ENABLED:-false}
      MODEL_MAX_OUTPUT_TOKENS: ${MODEL_MAX_OUTPUT_TOKENS:-8192}
      MODEL_MAX_SOURCE_CHARACTERS: ${MODEL_MAX_SOURCE_CHARACTERS:-60000}
      MODEL_PROVIDER_ORDER: ${MODEL_PROVIDER_ORDER:-gemini,groq}
      MODEL_REQUEST_TIMEOUT_MS: ${MODEL_REQUEST_TIMEOUT_MS:-90000}
      MODEL_TEMPERATURE: ${MODEL_TEMPERATURE:-0.35}
      NODE_ENV: production
      RESEARCH_MAX_SOURCE_BYTES: ${RESEARCH_MAX_SOURCE_BYTES:-3000000}
      RESEARCH_REQUEST_TIMEOUT_MS: ${RESEARCH_REQUEST_TIMEOUT_MS:-20000}
      RESEARCH_USER_AGENT: ${RESEARCH_USER_AGENT:-BuzzyTrip/0.1 (https://www.buzzytrip.com)}
      TREND_DISCOVERY_ENABLED: ${TREND_DISCOVERY_ENABLED:-false}
      TREND_DISCOVERY_INTERVAL_MS: ${TREND_DISCOVERY_INTERVAL_MS:-86400000}
      TREND_GOOGLE_GEOS: ${TREND_GOOGLE_GEOS:-IN,US,GB,AU,AE,SG}
      TREND_LOOKBACK_DAYS: ${TREND_LOOKBACK_DAYS:-7}
      TREND_MAX_SIGNALS_PER_PROVIDER: ${TREND_MAX_SIGNALS_PER_PROVIDER:-500}
      TREND_REQUEST_TIMEOUT_MS: ${TREND_REQUEST_TIMEOUT_MS:-15000}
      TREND_SOURCE_LAG_DAYS: ${TREND_SOURCE_LAG_DAYS:-2}
      TREND_USER_AGENT: ${TREND_USER_AGENT:-BuzzyTrip/0.1 (https://www.buzzytrip.com)}
      UNSPLASH_ACCESS_KEY: ${UNSPLASH_ACCESS_KEY:-}
      UNSPLASH_API_BASE_URL: ${UNSPLASH_API_BASE_URL:-https://api.unsplash.com}
      UNSPLASH_APPLICATION_NAME: ${UNSPLASH_APPLICATION_NAME:-buzzytrip}
      UNSPLASH_IMAGES_PER_GUIDE: ${UNSPLASH_IMAGES_PER_GUIDE:-4}
      WORKER_HEARTBEAT_INTERVAL_MS: ${WORKER_HEARTBEAT_INTERVAL_MS:-30000}
    logging: *default-logging
    restart: unless-stopped

  web:
    <<: *runtime-security
    build:
      context: .
      dockerfile: Dockerfile
      target: web
    depends_on:
      api:
        condition: service_healthy
    environment:
      API_INTERNAL_URL: http://api:4000/api
      HOSTNAME: 0.0.0.0
      NODE_ENV: production
      PORT: 3000
    expose:
      - '3000'
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:3000/api/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    logging: *default-logging
    restart: unless-stopped
