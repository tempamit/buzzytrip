name: buzzytrip

x-api-build: &api-build
  context: .
  dockerfile: Dockerfile
  target: api

x-runtime-security: &runtime-security
  cap_drop:
    - ALL
  init: true
  security_opt:
    - no-new-privileges:true

x-logging: &default-logging
  driver: json-file
  options:
    max-file: '3'
    max-size: 10m

services:
  migrate:
    <<: *runtime-security
    build: *api-build
    command: ['node', '/app/packages/database/dist/migrate.js']
    environment:
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL must point to the private Coolify PostgreSQL service}
      NODE_ENV: production
    logging: *default-logging
    restart: 'no'

  api:
    <<: *runtime-security
    build: *api-build
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL must point to the private Coolify PostgreSQL service}
      DB_POOL_MAX: ${API_DB_POOL_MAX:-10}
      NODE_ENV: production
      PORT: 4000
    expose:
      - '4000'
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:4000/api/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    logging: *default-logging
    restart: unless-stopped

  worker:
    <<: *runtime-security
    build:
      context: .
      dockerfile: Dockerfile
      target: worker
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL must point to the private Coolify PostgreSQL service}
      DB_POOL_MAX: ${WORKER_DB_POOL_MAX:-5}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      NODE_ENV: production
      WORKER_HEARTBEAT_INTERVAL_MS: ${WORKER_HEARTBEAT_INTERVAL_MS:-30000}
    logging: *default-logging
    restart: unless-stopped

  web:
    <<: *runtime-security
    build:
      context: .
      dockerfile: Dockerfile
      target: web
    depends_on:
      api:
        condition: service_healthy
    environment:
      API_INTERNAL_URL: http://api:4000/api
      HOSTNAME: 0.0.0.0
      NODE_ENV: production
      PORT: 3000
    expose:
      - '3000'
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:3000/api/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    logging: *default-logging
    restart: unless-stopped
